name: Node.js Express CI/CD Pipeline

on:
  push:
      branches: [ master ]
      # types: [ opened, synchronize, reopened ]

jobs:
  # Job 1: Runs on PRs and on direct merges to validate the codebase
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your Express app's Node version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test build
        run: npm run build

      # - name: Run Linter (Optional but Recommended)
      #   run: npm run lint --if-present

      # - name: Run Tests
      #   run: npm test

  # Job 2: Runs ONLY when a Pull Request is successfully merged into main/develop
  deploy:
    needs: test-and-validate
  #   # Condition: Triggered by a push event (which occurs when a PR is merged)
  #   if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/notification-service:latest
            ${{ vars.DOCKER_USERNAME }}/notification-service:${{ github.sha }}
 
